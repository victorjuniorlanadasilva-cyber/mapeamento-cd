<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Mapeamento</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background-color: #f7f7f7;
    padding: 20px;
  }
  h2 {
    color: #2c3e50;
  }
  input, select, button {
    padding: 8px;
    margin: 5px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
  }
  button {
    background-color: #2980b9;
    color: white;
    border: none;
    cursor: pointer;
  }
  button:hover {
    background-color: #3498db;
  }
  ul {
    list-style-type: none;
    padding: 0;
  }
  li {
    background-color: white;
    margin: 5px 0;
    padding: 10px;
    border-radius: 5px;
    box-shadow: 1px 1px 3px rgba(0,0,0,0.1);
  }
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2980b9">
</head>
<body>

  <h2>Mapeamento</h2>

  <label>Número do Pedido:</label><br>
  <input type="text" id="pedido"><br><br>

  <label>Número do Artigo:</label><br>
  <input type="text" id="artigo"><br><br>

  <label>Endereço:</label><br>
  <input type="text" id="endereco"><br><br>

  <label>Setor:</label><br>
  <select id="setor">
    <option value="K">K</option>
    <option value="EV">EV</option>
    <option value="EL">EL</option>
  </select><br><br>

  <button onclick="salvar()">Salvar</button>

  <hr>

  <h3>Buscar por Pedido</h3>
  <input type="text" id="buscarPedido">
  <button onclick="buscar()">Buscar</button>
<label>Filtrar por Setor:</label>
<select id="filtroSetor">
  <option value="">Todos</option>
  <option value="K">K</option>
  <option value="EV">EV</option>
  <option value="EL">EL</option>
</select>

<button onclick="exportarExcel()">Exportar para Excel</button>

<label>Filtrar por Setor:</label>
<select id="filtroSetor">
  <option value="">Todos</option>
  <option value="K">K</option>
  <option value="EV">EV</option>
  <option value="EL">EL</option>
</select>
  <ul id="resultado"></ul>

<script>
function salvar() {
  fetch("http://localhost:3000/adicionar", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      numero_pedido: document.getElementById("pedido").value,
      numero_artigo: document.getElementById("artigo").value,
      endereco: document.getElementById("endereco").value,
      setor: document.getElementById("setor").value
    })
  })
  .then(res => res.text())
  .then(msg => alert(msg));
}

function buscar() {
  const pedido = document.getElementById("buscarPedido").value;
  const setorSelecionado = document.getElementById("filtroSetor").value;

  // Se digitou pedido, busca o específico; se deixou em branco, busca todos
  const url = pedido ? "http://localhost:3000/buscar/" + pedido : "http://localhost:3000/buscar";

  fetch(url)
    .then(res => res.json())
    .then(dados => {
      const lista = document.getElementById("resultado");
      lista.innerHTML = "";

      dados
        .filter(item => item.status === "MAPEADO") // só pendentes
        .filter(item => setorSelecionado === "" || item.setor === setorSelecionado) // filtro por setor
        .forEach(item => {
          const li = document.createElement("li");
          li.innerHTML = `
            Pedido: ${item.numero_pedido} |
            Artigo: ${item.numero_artigo} |
            Endereço: ${item.endereco} |
            Setor: ${item.setor} |
            Status: ${item.status}
            <button onclick="baixar(${item.id})">Dar Baixa</button>
          `;
          lista.appendChild(li);
        });
    });
}
function baixar(id) {
  fetch("http://localhost:3000/baixar/" + id, {
    method: "PUT"
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
  });
}

function exportarExcel() {
  window.location.href = "http://localhost:3000/exportar";
}
// ENTER AUTOMÁTICO + LIMPAR CAMPOS
document.getElementById("pedido").addEventListener("keydown", function(e) {
  if(e.key === "Enter") {
    e.preventDefault();
    document.getElementById("artigo").focus();
  }
});

document.getElementById("artigo").addEventListener("keydown", function(e) {
  if(e.key === "Enter") {
    e.preventDefault();
    document.getElementById("endereco").focus();
  }
});

document.getElementById("endereco").addEventListener("keydown", function(e) {
  if(e.key === "Enter") {
    e.preventDefault();
    document.getElementById("setor").focus();
  }
});

document.getElementById("setor").addEventListener("keydown", function(e) {
  if(e.key === "Enter") {
    e.preventDefault();
    salvar(); // Salva automaticamente
    // Limpa os campos
    document.getElementById("pedido").value = "";
    document.getElementById("artigo").value = "";
    document.getElementById("endereco").value = "";
    document.getElementById("setor").value = "K"; // opcional: seta padrão
    // Volta o foco para o pedido
    document.getElementById("pedido").focus();
  }
});
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js')
    .then(() => console.log('Service Worker registrado!'));
}

</script>

</body>
</html>
